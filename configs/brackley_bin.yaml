# Brackley finetune on the SAUVOLA-BINARIZED set — warm-start raven.
#
# The binarized/color A/B partner to configs/brackley.yaml. Binarizing to
# black-on-white puts the charters in raven's *native* regime (raven was trained
# on binarized black-on-white), so this is arguably a cleaner warm-start match
# than the colour finetune — no binarized->colour domain gap to cross.
#
# Prep the data first (writes data/brackley-set-bin/, capped + binarized):
#   mole prep data/brackley-set --binarize sauvola --max-side 2048
#
# Launch (pick a free GPU; 0 = hwi_paper):
#   CUDA_VISIBLE_DEVICES=4 mole train configs/brackley_bin.yaml \
#       --init-from checkpoints/raven_checkpoint.pth
#
# Before this, capture the FREE baseline (no training) — the real A/B point:
#   mole embed checkpoints/raven_checkpoint.pth data/brackley-set-bin \
#       out.npy --pooling vlad --vlad-clusters 100 --foreground   # intensity fg
#       works now: Sauvola is black-on-white
#   mole eval out.npy data/brackley-set-bin --topk 1,5            # vs colour 0.497/0.44

data:
  path: data/brackley-set-bin  # Sauvola output (max_side 2048): black-on-white PNGs
  window_size: 256          # finer descriptors (the HWI lesson) + raven's native scale
  model_size: 224
  overlap: 0.5              # moderate density; warm-started finetune on ~300 imgs
  use_zones: false          # zones.json lives on the COLOUR set; the intensity
                            #   foreground filter works on black-on-white, so skip
                            #   zones (re-run `mole prep` on -bin to add them back)
  invert: true              # feed raven its NATIVE polarity. Sauvola writes black-on-white
                            #   to disk (human-readable), so the loader must invert to
                            #   white-on-black — the regime raven was trained on (per Tim).
                            #   The A/B quantifies the gain; direction is Tim-authoritative.
                            #   (Foreground filtering below is polarity-invariant, unaffected.)
  foreground_min: 0.05      # drop near-blank windows (polarity-invariant contrast test):
                            #   focuses training on inked windows + cleans the projector
                            #   at the source. 0.05 = window must be >=5% inked; tune on data.
  num_workers: 6

aug:
  preset: mild              # keeps gaussian blur (DINO base); we disable the rest below
  overrides:
    # Multi-crop as in historical_wi / brackley: 2 global + 8 local.
    local_crops_number: 8
    local_size: 96
    global_crops_scale: [0.4, 1.0]
    local_crops_scale: [0.05, 0.4]
    # Binary morphology (raven's recipe for bitonal data): random dilation/erosion.
    erosion_dilation_prob: 0.5
    # Colour/JPEG/rotation augs are meaningless on 2-tone data -> disable
    # (this is the aug delta from the COLOUR brackley.yaml).
    color_jitter_prob: 0.0
    grayscale_prob: 0.0
    jpeg_prob: 0.0
    rotation_prob: 0.0

model:
  arch: vit_small           # matches raven; --init-from adopts it regardless
  patch_size: 16

optim:
  lr: 5.0e-4                # GENTLE warm-start peak (~9.4e-5 at batch 48) — adapt
                            #   raven's features, don't wipe them (NOT hwi's 0.005)
  warmup_epochs: 10         # long warmup, same reason
  batch_size: 48

train:
  epochs: 80                # warm-started + small corpus; watch the projector, stop early
  fp16: true
  output_dir: runs/brackley_bin
  save_every_steps: 500
  saveckp_epoch_freq: 10
  projector_every_epochs: 5
